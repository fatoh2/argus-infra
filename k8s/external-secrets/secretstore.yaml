apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: doppler-backend
  namespace: default
spec:
  provider:
    doppler:
      auth:
        secretRef:
          name: doppler-auth
          key: token
      # Optional: specify project and config if not using the default
      # project: "argus"
      # config: "prd"
