apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-app-secret
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: doppler-backend
    kind: SecretStore
  target:
    name: example-app-secret
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: REDIS_URL
    - secretKey: API_KEY
      remoteRef:
        key: API_KEY
