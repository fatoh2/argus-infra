# Grafana Admin Credentials
#
# This is a template for the grafana-admin-credentials secret.
# In production, this secret is managed by External Secrets Operator (Doppler)
# or sealed with SealedSecrets / Bitnami Sealed Secrets.
#
# To create this secret manually (for testing only):
#   kubectl create secret generic grafana-admin-credentials \
#     --namespace monitoring \
#     --from-literal=admin-user=admin \
#     --from-literal=admin-password=<secure-password>
#
# For production, configure the secret via External Secrets Operator:
#   - Provider: Doppler
#   - Secret name: GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD
#   - Mapping: grafana-admin-credentials (admin-user, admin-password)
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
    # Prevent ArgoCD from pruning this if managed externally
type: Opaque
stringData:
  admin-user: "admin"
  admin-password: "CHANGE_ME_TO_A_SECURE_PASSWORD"
