apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  cluster-overview.json: |
    {
      "__inputs": [
        {
          "name": "DS_PROMETHEUS",
          "label": "Prometheus",
          "description": "",
          "type": "datasource"
        }
      ],
      "__requires": [
        {
          "type": "grafana",
          "minVersion": "7.0.0"
        },
        {
          "type": "datasource",
          "id": "prometheus"
        }
      ],
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": {
            "type": "prometheus",
            "uid": ""
          },
          "gridPos": {
            "h": 9,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 2,
          "interval": "",
          "legend": {
            "calcs": [],
            "displayMode": "list",
            "placement": "bottom",
            "showLegend": true
          },
          "maxDataPoints": [
            6720
          ],
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "expr": "sum(kube_pod_container_resource_requests_cpu_cores{namespace='monitoring'})",
              "legendFormat": "CPU Requests (Monitoring)",
              "refId": "A"
            },
            {
              "expr": "sum(kube_pod_container_resource_limits_cpu_cores{namespace='monitoring'})",
              "legendFormat": "CPU Limits (Monitoring)",
              "refId": "B"
            }
          ],
          "title": "CPU Usage (Monitoring Namespace)",
          "tooltip": {
            "mode": "single"
          },
          "type": "timeseries"
        }
      ],
      "schemaVersion": 38,
      "style": "dark",
      "tags": [],
      "templating": {
        "list": [
          {
            "current": {
              "selected": false,
              "text": "Prometheus",
              "value": "Prometheus"
            },
            "hide": 0,
            "includeAll": false,
            "label": "Datasource",
            "multi": false,
            "name": "DS_PROMETHEUS",
            "options": [],
            "query": "prometheus",
            "refresh": 1,
            "regex": "",
            "skipUrlSync": false,
            "type": "datasource"
          }
        ]
      },
      "time": {
        "from": "now-1h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "utc",
      "title": "Cluster Overview",
      "uid": "cluster-overview-example",
      "version": 1
    }
