apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Disable anonymous access
  users.anon.enabled: "false"
  # Configure the default project to restrict deployments to the argocd namespace
