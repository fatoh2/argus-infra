apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # Policy for restricting access to the argocd namespace
  policy.csv: |
    # NOTE: This is a broad admin policy. For production, consider stricter RBAC roles and ArgoCD Projects to enforce least privilege.
    # For more information, refer to: https://argo-cd.readthedocs.io/en/stable/operator-manual/rbac/
    # NOTE: This is a broad admin policy. For production, consider stricter RBAC roles and ArgoCD Projects.
    p, role:admin, applications, *, argocd/*, allow
    p, role:admin, clusters, *, *, allow
    p, role:admin, repositories, *, *, allow
    p, role:admin, projects, *, *, allow
    p, role:admin, accounts, *, *, allow
    p, role:admin, gpgkeys, *, *, allow
    p, role:admin, certificates, *, *, allow
    p, role:admin, exec, *, *, allow
    g, admin, role:admin
  policy.default: role:readonly
