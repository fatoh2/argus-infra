apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
data:
  # Policy for restricting access to the argocd namespace
  policy.csv: |
    p, role:admin, applications, *, argocd/*, allow
    p, role:readonly, applications, get, */*, allow
    g, admin, role:admin
  policy.default: role:readonly
