apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    targetRevision: '0.27.0'
    chart: loki
    helm:
      values: |
        persistence:
          enabled: true
          storageClassName: "standard"
          accessModes:
            - ReadWriteOnce
          size: 10Gi
        commonLabels:
          grafana_datasource: "1"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
