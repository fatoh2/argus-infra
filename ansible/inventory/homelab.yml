#   control_plane_ip  -> k8s-control
#   worker_ips        -> k8s-worker-1, k8s-worker-2
all:
  vars:
    ansible_user: root
    # ansible_ssh_private_key_file: ~/.ssh/argus_homelab
    # k3s version for all nodes ("" = latest stable)
    k3s_version: "v1.28.5+k3s1"
  children:
    k3s_server:
      hosts:
        k8s-control:
          ansible_host: <CONTROL_PLANE_IP>
    k3s_agent:
      hosts:
        k8s-worker-1:
          ansible_host: <WORKER_1_IP>
        k8s-worker-2:
          ansible_host: <WORKER_2_IP>
    k3s_cluster:
      children:
        k3s_server:
        k3s_agent:
