name: Sanity Checks

on:
  pull_request:
    branches:
      - develop

jobs:
  sanity-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.7

      - name: Terraform Validate
        run: |
          cd terraform/environments/homelab
          terraform init -backend=false
          terraform validate

      - name: Terraform Format Check
        run: |
          cd terraform/environments/homelab
          terraform fmt -check

      - name: Terraform Plan (no apply)
        run: |
          cd terraform/environments/homelab
          # Initialize without backend to avoid needing cloud credentials in CI.
          # Plan with dummy variable values to validate configuration syntax.
          # In a real run, these would come from terraform.tfvars (gitignored) or CI secrets.
          terraform init -backend=false -input=false
          terraform plan -no-color -input=false \
            -var="hcloud_token=ci-dummy-token" \
            -var="ssh_key_name=ci-dummy-key" \
            -var="location=nbg1" \
            -var="server_type=cx22" \
            -var="image=ubuntu-24.04"

      - name: Setup Python virtual environment for Ansible Lint
        run: |
          python3 -m venv /tmp/ansible-lint-venv
          /tmp/ansible-lint-venv/bin/pip install ansible-lint

      - name: Ansible Syntax Check
        run: |
          ansible-playbook --syntax-check -i ansible/inventory/homelab.yml ansible/playbooks/site.yml

      - name: Ansible Lint
        run: |
          /tmp/ansible-lint-venv/bin/ansible-lint ansible/playbooks/site.yml

      # ArgoCD app health check, cluster sanity, and ingress reachability are not feasible
      # in a standard PR check without a dedicated test cluster.
      # These steps are commented out to prevent CI failures in environments without a running cluster.
      # If these checks are critical, they should be part of a separate CI job that provisions
      # a temporary cluster.

      # - name: ArgoCD App Health Check (Placeholder)
      #   run: echo "ArgoCD app health check requires a running cluster and ArgoCD CLI access."

      # - name: Cluster Sanity Check (Placeholder)
      #   run: echo "Cluster sanity check requires kubectl access to a running cluster."

      # - name: Ingress Reachability Test (Placeholder)
      #   run: echo "Ingress reachability test requires a running cluster with ingress and network access."
