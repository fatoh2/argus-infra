name: CD Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - 'ansible/**'
      - 'k8s/**'
      - 'scripts/**'
      - '.github/workflows/cd-deploy.yml'

env:
  ANSIBLE_CONFIG: ansible/ansible.cfg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Critical Files Exist
        run: |
          CRITICAL_FILES=(
            terraform/environments/homelab/main.tf
            ansible/playbooks/site.yml
            k8s/argocd/install.yaml
            scripts/cluster-sanity.sh
            CLAUDE.md
            README.md
          )
          MISSING_FILES=()
          for file in "${CRITICAL_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              MISSING_FILES+=("$file")
            fi
          done
          if [ ${#MISSING_FILES[@]} -gt 0 ]; then
            echo "Error: The following critical files are missing:"
            for missing_file in "${MISSING_FILES[@]}"; do
              echo "- $missing_file"
            done
            exit 1
          fi
          echo "All critical files present."

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Format Check
        run: |
          if [ -d "terraform/environments/homelab" ]; then
            cd terraform/environments/homelab && terraform fmt -check -recursive
          else
            echo "No Terraform environment found, skipping"
          fi

      - name: Setup Ansible Lint
        run: |
          python3 -m venv /tmp/ansible-venv
          /tmp/ansible-venv/bin/pip install -q ansible-core ansible-lint
          if [ -f ansible/requirements.yml ]; then
            /tmp/ansible-venv/bin/ansible-galaxy collection install -r ansible/requirements.yml
          fi

      - name: Ansible Lint
        run: |
          if [ -d ansible/playbooks ] || [ -d ansible/roles ]; then
            /tmp/ansible-venv/bin/ansible-lint ansible/
          else
            echo "No Ansible content found, skipping"
          fi

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  build:
    name: Build (Validate + Plan)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Validate
        run: |
          if [ -d "terraform/environments/homelab" ]; then
            cd terraform/environments/homelab
            terraform init -backend=false -input=false
            terraform validate -input=false
          else
            echo "No Terraform environment found, skipping"
          fi

      - name: Terraform Plan
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          if [ -z "${HCLOUD_TOKEN}" ]; then
            echo "HCLOUD_TOKEN not configured — skipping Terraform plan."
            echo "Set HCLOUD_TOKEN in repo secrets to enable infrastructure plan validation."
            exit 0
          fi
          if [ ! -d "terraform/environments/homelab" ]; then
            echo "No Terraform environment found, skipping"
            exit 0
          fi
          cd terraform/environments/homelab
          terraform init -backend=false -input=false
          terraform plan -no-color -input=false \
            -target=module.network \
            -var="hcloud_token=${HCLOUD_TOKEN}" \
            -var="ssh_key_name=ci-dummy-key" \
            -var="ssh_key_id=0" \
            -var="location=nbg1" \
            -var="server_type=cx22" \
            -var="image=ubuntu-24.04"
  deploy:
    name: Deploy (skipped until cluster secrets configured)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Deploy step: set KUBECONFIG + ARGOCD_SERVER + ARGOCD_TOKEN in repo secrets to enable."
          echo "Skipping for now."
