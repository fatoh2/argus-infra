name: CD Deploy

on:
  push:
    branches:
      - main

env:
  ANSIBLE_CONFIG: ansible/ansible.cfg

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Format Check
        run: |
          cd terraform/environments/homelab
          terraform fmt -check -recursive

      - name: Setup Python virtual environment for Ansible Lint
        run: |
          python3 -m venv /tmp/ansible-lint-venv
          /tmp/ansible-lint-venv/bin/pip install ansible-core ansible-lint

      - name: Install Ansible Galaxy Collections
        run: |
          /tmp/ansible-lint-venv/bin/ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible Lint
        run: |
          /tmp/ansible-lint-venv/bin/ansible-lint ansible/playbooks/ ansible/roles/

      - name: Script Syntax Check (ShellCheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning

  build:
    name: Build (Validate + Plan)
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Validate
        run: |
          cd terraform/environments/homelab
          terraform init -backend=false
          terraform validate

      - name: Terraform Plan (no apply)
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          cd terraform/environments/homelab
          terraform init -backend=false -input=false
          terraform plan -no-color -input=false \
            -target=module.network \
            -var="hcloud_token=${HCLOUD_TOKEN}" \
            -var="ssh_key_name=ci-dummy-key" \
            -var="ssh_key_id=0" \
            -var="location=nbg1" \
            -var="server_type=cx22" \
            -var="image=ubuntu-24.04"

      - name: Setup Python virtual environment for Ansible
        run: |
          python3 -m venv /tmp/ansible-venv
          /tmp/ansible-venv/bin/pip install ansible-core ansible-lint

      - name: Install Ansible Galaxy Collections
        run: |
          /tmp/ansible-venv/bin/ansible-galaxy collection install -r ansible/requirements.yml

      - name: Ansible Syntax Check
        run: |
          /tmp/ansible-venv/bin/ansible-playbook --syntax-check \
            -i ansible/inventory/homelab.ci.yml ansible/playbooks/site.yml

      - name: Check Critical Files Exist
        run: |
          MISSING=0
          for file in \
            terraform/environments/homelab/main.tf \
            terraform/environments/homelab/variables.tf \
            terraform/environments/homelab/outputs.tf \
            ansible/playbooks/site.yml \
            ansible/inventory/homelab.ci.yml \
            ansible/inventory/homelab.yml.example \
            ansible/requirements.yml \
            k8s/argocd/app-of-apps.yaml \
            k8s/argocd/install.yaml \
            scripts/cluster-sanity.sh \
            scripts/bootstrap-argocd.sh \
            CLAUDE.md \
            README.md; do
            if [ ! -f "$file" ]; then
              echo "❌ Missing: $file"
              MISSING=$((MISSING + 1))
            else
              echo "✅ Found: $file"
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::$MISSING critical file(s) missing"
            exit 1
          fi
          echo "All critical files present."

  argocd-sync:
    name: Trigger ArgoCD Sync
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Notify ArgoCD Sync
        run: |
          echo "::notice::Merge to main detected. ArgoCD watches main branch and will auto-sync."
          echo "::notice::Commit: ${{ github.sha }}"
          echo "::notice::Triggered by: ${{ github.actor }}"

      - name: ArgoCD Sync via API (optional)
        if: ${{ vars.ARGOCD_SERVER != '' && secrets.ARGOCD_TOKEN != '' }}
        env:
          ARGOCD_SERVER: ${{ vars.ARGOCD_SERVER }}
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
        run: |
          # Trigger sync on the root app-of-apps so ArgoCD picks up changes immediately
          # rather than waiting for its default polling interval (3 minutes).
          curl -sS -X POST \
            "https://${ARGOCD_SERVER}/api/v1/applications/argocd-root/sync" \
            -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"prune": true, "dryRun": false, "strategy": {"hook": {}}}' \
            || echo "::warning::ArgoCD sync API call failed — cluster may not be reachable from CI. ArgoCD will auto-sync within its polling interval."
