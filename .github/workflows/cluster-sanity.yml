name: Cluster Sanity

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.check.outputs.enabled }}
    steps:
      - id: check
        run: |
          if [ "${{ vars.CLUSTER_SANITY_ENABLED }}" = "true" ]; then
            echo "enabled=true" >> $GITHUB_OUTPUT
          else
            echo "Cluster sanity disabled. Set CLUSTER_SANITY_ENABLED=true in repo variables to enable."
            echo "enabled=false" >> $GITHUB_OUTPUT
          fi

  cluster-sanity:
    needs: gate
    if: needs.gate.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Cluster nodes healthy
        run: kubectl get nodes --no-headers | awk '$2 != "Ready" { found=1; print } END { exit found }'

      - name: ArgoCD apps synced
        run: |
          kubectl get applications -n argocd --no-headers \
            | awk '$3 != "Synced" || $4 != "Healthy" { found=1; print } END { exit found }'
