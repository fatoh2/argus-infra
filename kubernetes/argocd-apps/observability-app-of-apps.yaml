apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/fatoh2/argus-infra.git # Replace with your repo URL
    targetRevision: HEAD
    path: kubernetes/argocd-apps/observability
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd # This app deploys other apps into their respective namespaces
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
